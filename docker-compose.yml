# Tessera : Local development stack.
#
# Démarrage minimal (MinIO + Streamlit uniquement) :
#   docker compose up -d
#
# Stack complète avec orchestration Kestra :
#   docker compose --profile full up -d
#
# Services :
#   minio      : object storage S3-compatible (bronze / silver / gold)
#   minio-mc   : bootstrap des buckets (one-shot au premier démarrage)
#   streamlit  : dashboard CDP monitoring (app.py)
#   kestra     : orchestration des flows [profile: full]
#
# DuckDB tourne in-process dans les scripts Python et dans Streamlit.
# Pas de container DuckDB. Le fichier warehouse est persisté localement.

name: tessera

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── MinIO : lakehouse S3-compatible ──────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: tessera-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console: http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Bucket bootstrap (one-shot) ──────────────────────────────────────────
  minio-mc:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: tessera-minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET_BRONZE:-tessera-bronze};
      mc mb --ignore-existing local/${MINIO_BUCKET_SILVER:-tessera-silver};
      mc mb --ignore-existing local/${MINIO_BUCKET_GOLD:-tessera-gold};
      mc anonymous set download local/${MINIO_BUCKET_BRONZE:-tessera-bronze};
      echo 'Buckets ready.';
      exit 0;
      "

  # ── Streamlit : dashboard CDP ─────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: tessera-streamlit
    ports:
      - "8501:8501"   # http://localhost:8501
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DUCKDB_PATH: /app/warehouse/tessera.duckdb
      TESSERA_LOG_FORMAT: ${TESSERA_LOG_FORMAT:-json}
    volumes:
      - ./app.py:/app/app.py:ro
      - ./app:/app/app:ro
      # Bind mount du warehouse local : le dashboard lit le MÊME fichier DuckDB
      # que celui produit par `make pipeline` sur l'hôte. (Un volume nommé
      # resterait vide, le dashboard afficherait l'écran d'erreur "warehouse
      # introuvable" au lieu du vrai pipeline.)
      - ./warehouse:/app/warehouse:ro
    depends_on:
      minio:
        condition: service_healthy
    logging: *default-logging

  # ── Kestra : orchestration [profile: full] ────────────────────────────────
  # Démarrer avec : docker compose --profile full up -d
  kestra-postgres:
    image: postgres:16-alpine
    container_name: tessera-kestra-pg
    profiles: [full]
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - kestra_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  kestra:
    image: kestra/kestra:v0.20.7
    container_name: tessera-kestra
    profiles: [full]
    pull_policy: missing
    user: "root"
    command: server standalone
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
    ports:
      - "8080:8080"   # http://localhost:8080
    volumes:
      - kestra_storage:/app/storage
      - ./orchestration/flows:/app/flows:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
    depends_on:
      kestra-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    logging: *default-logging

volumes:
  minio_data:
  kestra_pg_data:
  kestra_storage:
