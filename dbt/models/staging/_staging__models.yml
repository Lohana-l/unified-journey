version: 2

models:
  - name: stg_ga4__events
    description: "Typed + pseudonymised GA4 events. Consent-withdrawn events dropped."
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: channel_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key

  - name: stg_meta__pixel_events
    columns:
      - name: event_id
        tests: [not_null, unique]

  - name: stg_shopify__customers
    columns:
      - name: shopify_customer_id
        tests: [not_null, unique]

  - name: stg_shopify__orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: shopify_customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_shopify__customers')
              field: shopify_customer_id

  - name: stg_email__events
    columns:
      - name: event_id
        tests: [not_null, unique]
