<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="680" fill="#ffffff"/>

  <!-- Titre -->
  <rect x="44" y="26" width="170" height="30" rx="6" fill="#b4552d" opacity="0.10"/>
  <text x="54" y="47" font-size="20" font-weight="800" fill="#1e3a52">Tessera</text>
  <text x="222" y="47" font-size="13" fill="#8a7a66">: composable, warehouse-native CDP</text>
  <text x="54" y="74" font-size="12.5" fill="#6f6052">Identity resolution and multi-touch attribution on an open lakehouse, no black-box CDP</text>

  <!-- Labels de colonnes -->
  <text x="54" y="118" font-size="11" font-weight="700" letter-spacing="2" fill="#8a7a66">4 SILOED SOURCES</text>
  <text x="330" y="118" font-size="11" font-weight="700" letter-spacing="2" fill="#b4552d">INGESTION</text>
  <text x="565" y="118" font-size="11" font-weight="700" letter-spacing="2" fill="#a05e22">LAKEHOUSE</text>
  <text x="800" y="118" font-size="11" font-weight="700" letter-spacing="2" fill="#1e3a52">TRANSFORMATION</text>
  <text x="1018" y="118" font-size="11" font-weight="700" letter-spacing="2" fill="#16a34a">RESTITUTION</text>

  <!-- Sources -->
  <g>
    <rect x="50" y="138" width="180" height="56" rx="9" fill="#c2503a" opacity="0.06"/>
    <rect x="50" y="138" width="180" height="56" rx="9" fill="none" stroke="#c2503a" stroke-opacity="0.45"/>
    <text x="64" y="161" font-size="12.5" font-weight="700" fill="#1e3a52">GA4: web analytics</text>
    <text x="64" y="180" font-size="11" fill="#8a7a66">id: client_id</text>

    <rect x="50" y="210" width="180" height="56" rx="9" fill="#b05570" opacity="0.06"/>
    <rect x="50" y="210" width="180" height="56" rx="9" fill="none" stroke="#b05570" stroke-opacity="0.45"/>
    <text x="64" y="233" font-size="12.5" font-weight="700" fill="#1e3a52">Meta Ads: paid social</text>
    <text x="64" y="252" font-size="11" fill="#8a7a66">id: fbp cookie</text>

    <rect x="50" y="282" width="180" height="56" rx="9" fill="#16a34a" opacity="0.06"/>
    <rect x="50" y="282" width="180" height="56" rx="9" fill="none" stroke="#16a34a" stroke-opacity="0.45"/>
    <text x="64" y="305" font-size="12.5" font-weight="700" fill="#1e3a52">Shopify: orders</text>
    <text x="64" y="324" font-size="11" fill="#8a7a66">id: customer_id</text>

    <rect x="50" y="354" width="180" height="56" rx="9" fill="#c9952a" opacity="0.08"/>
    <rect x="50" y="354" width="180" height="56" rx="9" fill="none" stroke="#c9952a" stroke-opacity="0.55"/>
    <text x="64" y="377" font-size="12.5" font-weight="700" fill="#1e3a52">Mailchimp: email</text>
    <text x="64" y="396" font-size="11" fill="#8a7a66">id: subscriber_id</text>
  </g>

  <!-- Flèches sources -> ingestion -->
  <g stroke="#b3a18c" stroke-width="1.4" fill="none">
    <path d="M232 166 C 266 166, 268 230, 298 248"/>
    <path d="M232 238 C 260 238, 266 252, 298 262"/>
    <path d="M232 310 C 260 310, 266 292, 298 278"/>
    <path d="M232 382 C 266 382, 268 312, 298 292"/>
  </g>

  <!-- Ingestion -->
  <rect x="300" y="200" width="162" height="158" rx="11" fill="#ffffff" stroke="#e9cfc0"/>
  <text x="316" y="228" font-size="13.5" font-weight="700" fill="#1e3a52">Python ingestion</text>
  <text x="316" y="252" font-size="11.5" fill="#5d6b78">API extraction</text>
  <text x="316" y="270" font-size="11.5" fill="#5d6b78">→ Parquet files</text>
  <text x="316" y="288" font-size="11.5" fill="#5d6b78">→ MinIO bucket</text>
  <rect x="316" y="306" width="130" height="24" rx="12" fill="none" stroke="#d4c4b4"/>
  <text x="381" y="322" font-size="10.5" fill="#8a7a66" text-anchor="middle">handles 72 h lag</text>

  <!-- Flèche ingestion -> lakehouse -->
  <path d="M464 279 C 486 279, 488 279, 506 279" stroke="#b4552d" stroke-width="1.8" fill="none"/>
  <path d="M501 274 L 509 279 L 501 284" fill="none" stroke="#b4552d" stroke-width="1.8"/>

  <!-- Lakehouse -->
  <rect x="512" y="148" width="208" height="262" rx="11" fill="#fdfcfa" stroke="#e9cfc0"/>
  <text x="528" y="174" font-size="13.5" font-weight="700" fill="#1e3a52">MinIO lakehouse</text>
  <text x="528" y="191" font-size="10.5" fill="#8a7a66">S3-compatible, Parquet</text>
  <rect x="528" y="202" width="176" height="44" rx="7" fill="#a05e22" opacity="0.10"/>
  <rect x="528" y="202" width="176" height="44" rx="7" fill="none" stroke="#a05e22" stroke-opacity="0.45"/>
  <text x="540" y="220" font-size="11.5" font-weight="700" fill="#824c1b">bronze: raw Parquet</text>
  <text x="540" y="237" font-size="10" fill="#8a7a66">append-only</text>
  <rect x="528" y="256" width="176" height="44" rx="7" fill="#5b6b7a" opacity="0.08"/>
  <rect x="528" y="256" width="176" height="44" rx="7" fill="none" stroke="#5b6b7a" stroke-opacity="0.40"/>
  <text x="540" y="274" font-size="11.5" font-weight="700" fill="#46555f">silver: typed + deduped</text>
  <text x="540" y="291" font-size="10" fill="#8a7a66">Parquet</text>
  <rect x="528" y="310" width="176" height="44" rx="7" fill="#b08515" opacity="0.10"/>
  <rect x="528" y="310" width="176" height="44" rx="7" fill="none" stroke="#b08515" stroke-opacity="0.45"/>
  <text x="540" y="328" font-size="11.5" font-weight="700" fill="#8f6c10">gold: marts</text>
  <text x="540" y="345" font-size="10" fill="#8a7a66">Parquet, analysis-ready</text>
  <text x="616" y="390" font-size="10.5" fill="#8a7a66" text-anchor="middle">medallion architecture</text>

  <!-- Flèche lakehouse -> transformation -->
  <path d="M722 279 C 744 279, 746 279, 764 279" stroke="#b4552d" stroke-width="1.8" fill="none"/>
  <path d="M759 274 L 767 279 L 759 284" fill="none" stroke="#b4552d" stroke-width="1.8"/>

  <!-- Transformation -->
  <rect x="770" y="148" width="210" height="262" rx="11" fill="#f4f6f8" stroke="#c2cfdb"/>
  <text x="786" y="174" font-size="13.5" font-weight="700" fill="#1e3a52">DuckDB + dbt-duckdb 1.9</text>
  <rect x="786" y="186" width="178" height="42" rx="7" fill="#ffffff" stroke="#dde5ec"/>
  <text x="798" y="203" font-size="11.5" font-weight="700" fill="#1e3a52">staging: typed views</text>
  <text x="798" y="219" font-size="10" fill="#8a7a66">GA4, Meta, Shopify, email</text>
  <rect x="786" y="236" width="178" height="42" rx="7" fill="#ffffff" stroke="#dde5ec"/>
  <text x="798" y="253" font-size="11.5" font-weight="700" fill="#1e3a52">identity graph</text>
  <text x="798" y="269" font-size="10" fill="#8a7a66">→ unified_user_id</text>
  <rect x="786" y="286" width="178" height="42" rx="7" fill="#ffffff" stroke="#dde5ec"/>
  <text x="798" y="303" font-size="11.5" font-weight="700" fill="#1e3a52">attribution: 4 models</text>
  <text x="798" y="319" font-size="10" fill="#8a7a66">first, last, linear, position-based</text>
  <rect x="786" y="336" width="178" height="42" rx="7" fill="#ffffff" stroke="#dde5ec"/>
  <text x="798" y="353" font-size="11.5" font-weight="700" fill="#1e3a52">marts</text>
  <text x="798" y="369" font-size="10" fill="#8a7a66">sessions, funnels, touchpoints</text>
  <text x="875" y="396" font-size="10.5" fill="#8a7a66" text-anchor="middle">dbt tests + singular tests</text>

  <!-- Flèche transformation -> restitution -->
  <path d="M982 279 C 1000 279, 1002 279, 1014 279" stroke="#b4552d" stroke-width="1.8" fill="none"/>
  <path d="M1009 274 L 1017 279 L 1009 284" fill="none" stroke="#b4552d" stroke-width="1.8"/>

  <!-- Restitution -->
  <rect x="1020" y="208" width="140" height="142" rx="11" fill="#16a34a" opacity="0.05"/>
  <rect x="1020" y="208" width="140" height="142" rx="11" fill="none" stroke="#16a34a" stroke-opacity="0.40"/>
  <text x="1036" y="236" font-size="13.5" font-weight="700" fill="#1e3a52">Streamlit</text>
  <text x="1036" y="260" font-size="11" fill="#5d6b78">KPIs, identity</text>
  <text x="1036" y="277" font-size="11" fill="#5d6b78">graph,</text>
  <text x="1036" y="294" font-size="11" fill="#5d6b78">attribution,</text>
  <text x="1036" y="311" font-size="11" fill="#5d6b78">GDPR, logs</text>

  <!-- Connecteurs pointillés vers Kestra -->
  <g stroke="#d4c4b4" stroke-width="1.2" stroke-dasharray="3 4">
    <line x1="381" y1="358" x2="381" y2="464"/>
    <line x1="616" y1="410" x2="616" y2="464"/>
    <line x1="875" y1="410" x2="875" y2="464"/>
  </g>

  <!-- Bandeau Kestra -->
  <rect x="50" y="466" width="1100" height="58" rx="10" fill="#f5f6f8" stroke="#e9cfc0"/>
  <text x="70" y="490" font-size="13" font-weight="700" fill="#1e3a52">Kestra 0.20: orchestration</text>
  <text x="70" y="508" font-size="10.5" fill="#8a7a66">YAML-native DAGs, scheduled (cron) + manual replays</text>
  <text x="400" y="490" font-size="11.5" fill="#5d6b78">pipeline: ingestion → lakehouse → dbt build → quality checks → publish</text>
  <text x="400" y="508" font-size="11.5" fill="#5d6b78">replays and backfills for late Meta events (up to 72 h)</text>

  <!-- 3 cartouches du bas -->
  <rect x="50" y="556" width="350" height="78" rx="10" fill="#16a34a" opacity="0.05"/>
  <rect x="50" y="556" width="350" height="78" rx="10" fill="none" stroke="#16a34a" stroke-opacity="0.35"/>
  <text x="70" y="582" font-size="12.5" font-weight="700" fill="#1e3a52">Data quality</text>
  <text x="70" y="601" font-size="11" fill="#5d6b78">Soda Core checks + dbt tests, singular tests:</text>
  <text x="70" y="618" font-size="11" fill="#5d6b78">Σ weights = 1, funnel monotonicity, orphans</text>

  <rect x="425" y="556" width="350" height="78" rx="10" fill="#1e3a52" opacity="0.04"/>
  <rect x="425" y="556" width="350" height="78" rx="10" fill="none" stroke="#1e3a52" stroke-opacity="0.30"/>
  <text x="445" y="582" font-size="12.5" font-weight="700" fill="#1e3a52">Governance: GDPR</text>
  <text x="445" y="601" font-size="11" fill="#5d6b78">consent propagated everywhere, pseudonymised PII,</text>
  <text x="445" y="618" font-size="11" fill="#5d6b78">right to be forgotten via unified_user_id</text>

  <rect x="800" y="556" width="350" height="78" rx="10" fill="#b4552d" opacity="0.05"/>
  <rect x="800" y="556" width="350" height="78" rx="10" fill="none" stroke="#b4552d" stroke-opacity="0.35"/>
  <text x="820" y="582" font-size="12.5" font-weight="700" fill="#1e3a52">Platform &amp; CI</text>
  <text x="820" y="601" font-size="11" fill="#5d6b78">Portable to AWS / GCP (adapter swap),</text>
  <text x="820" y="618" font-size="11" fill="#5d6b78">Loguru JSON logs, DuckDB audit, GitHub Actions</text>

  <!-- Pied de page -->
</svg>
